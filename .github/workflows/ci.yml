name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install fastapi uvicorn scipy numpy pandas scikit-learn
      - run: python -c "from main import app; print('✅ FastAPI app loads OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "shahwarkhaleel@gmail.com"
          git config user.name "Shahwar98"
          git remote add space https://shahwar98:$HF_TOKEN@huggingface.co/spaces/shahwar98/paper-recommender
          git push space main --force
